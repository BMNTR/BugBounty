<svg viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <title>BugBounty Banner</title>
  <desc>Visual banner displaying a terminal interface running BugBounty commands.</desc>
  <defs>
    <style>
      .font-mono { font-family: Consolas, 'Fira Code', 'JetBrains Mono', Menlo, Monaco, 'Courier New', monospace; }
      .font-sans { font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif; }
    </style>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#1a2128"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#39d353"/>
      <stop offset="100%" stop-color="#2ea8ff"/>
    </linearGradient>
    
    <!-- Moving Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.04"/>
      <!-- SMIL Animation for grid flowing downwards -->
      <animateTransform attributeName="patternTransform" type="translate" values="0 0; 0 40" dur="3s" repeatCount="indefinite"/>
    </pattern>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="drop-shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="15" stdDeviation="15" flood-color="#000000" flood-opacity="0.6"/>
    </filter>

    <!-- Clip path for typewriter effect -->
    <clipPath id="typewriter">
      <rect x="18" y="40" width="0" height="20">
        <!-- typing animation starts at 0.5s, ends at 1.5s -->
        <animate attributeName="width" values="0; 180" dur="1s" begin="0.5s" fill="freeze" />
      </rect>
    </clipPath>
  </defs>

  <!-- background -->
  <rect width="1200" height="300" fill="url(#bg)"/>
  <rect width="1200" height="300" fill="url(#grid)"/>

  <!-- top accent line -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- faint scanning brackets with SMIL pulse -->
  <g stroke="#39d353" stroke-width="2" fill="none" opacity="0.2">
    <animate attributeName="opacity" values="0.2; 0.6; 0.2" dur="4s" repeatCount="indefinite"/>
    <path d="M 40 40 L 40 70 M 40 40 L 70 40"/>
    <path d="M 1160 260 L 1160 230 M 1160 260 L 1130 260"/>
  </g>

  <!-- decorative hex / binary column, right side -->
  <g class="font-mono" fill="#1f6feb" font-size="13">
    <text x="1000" y="50" opacity="0.2">0x2f8a<animate attributeName="opacity" values="0.2; 1; 0.2" dur="3s" begin="0s" repeatCount="indefinite"/></text>
    <text x="1000" y="72" opacity="0.2">CVE-████<animate attributeName="opacity" values="0.2; 1; 0.2" dur="4s" begin="1s" repeatCount="indefinite"/></text>
    <text x="1000" y="94" opacity="0.2">0x91c3<animate attributeName="opacity" values="0.2; 1; 0.2" dur="5s" begin="2s" repeatCount="indefinite"/></text>
    <text x="1000" y="116" opacity="0.2">GET /api<animate attributeName="opacity" values="0.2; 1; 0.2" dur="3s" begin="0.5s" repeatCount="indefinite"/></text>
    <text x="1000" y="138" opacity="0.2">200 OK<animate attributeName="opacity" values="0.2; 1; 0.2" dur="4s" begin="1.5s" repeatCount="indefinite"/></text>
    <text x="1000" y="160" opacity="0.2">0x77e1<animate attributeName="opacity" values="0.2; 1; 0.2" dur="5s" begin="2.5s" repeatCount="indefinite"/></text>
    <text x="1000" y="182" opacity="0.2">nuclei -t<animate attributeName="opacity" values="0.2; 1; 0.2" dur="3s" begin="1s" repeatCount="indefinite"/></text>
    <text x="1000" y="204" opacity="0.2">found: 3<animate attributeName="opacity" values="0.2; 1; 0.2" dur="4s" begin="2s" repeatCount="indefinite"/></text>
    <text x="1000" y="226" opacity="0.2">0xb4d2<animate attributeName="opacity" values="0.2; 1; 0.2" dur="5s" begin="0.5s" repeatCount="indefinite"/></text>
    <text x="1000" y="248" opacity="0.2">scan.log<animate attributeName="opacity" values="0.2; 1; 0.2" dur="3s" begin="2.5s" repeatCount="indefinite"/></text>
  </g>

  <!-- terminal window -->
  <g transform="translate(85,105)" filter="url(#drop-shadow)">
    <rect x="0" y="0" width="640" height="135" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
    <rect x="0" y="0" width="640" height="28" rx="10" fill="#21262d"/>
    <circle cx="18" cy="14" r="5" fill="#ff5f56"/>
    <circle cx="38" cy="14" r="5" fill="#ffbd2e"/>
    <circle cx="58" cy="14" r="5" fill="#27c93f"/>
    <text x="320" y="19" class="font-mono" font-size="12" fill="#8b949e" text-anchor="middle">agent@bugbounty:~</text>

    <!-- Line 1: Typewriter command -->
    <g clip-path="url(#typewriter)">
      <text x="18" y="55" class="font-mono" font-size="15" fill="#39d353">$ /program target.com</text>
    </g>

    <!-- Blinking Cursor -->
    <text x="18" y="55" class="font-mono" font-size="15" fill="#39d353">
      <animate attributeName="opacity" values="1; 0; 1" dur="0.8s" repeatCount="indefinite"/>
      <animate attributeName="x" values="18; 192" dur="1s" begin="0.5s" fill="freeze"/>
      █
    </text>

    <!-- Line 2: Recon output -->
    <text x="18" y="78" class="font-mono" font-size="13" fill="#8b949e" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.1s" begin="2s" fill="freeze"/>
      → recon: subfinder, httpx, nuclei
    </text>
    
    <!-- Line 3: Audit output -->
    <text x="18" y="98" class="font-mono" font-size="13" fill="#8b949e" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.1s" begin="3.5s" fill="freeze"/>
      → audit: source, mobile, cloud
    </text>

    <!-- Line 4: Report output -->
    <text x="18" y="118" class="font-mono" font-size="13" fill="#2ea8ff" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.1s" begin="5s" fill="freeze"/>
      → report: final_report.md ✓
    </text>
  </g>

  <!-- title block -->
  <g transform="translate(85,80)">
    <text x="0" y="0" class="font-sans" font-size="46" font-weight="800" fill="#f0f6fc" filter="url(#glow)">Bug<tspan fill="#39d353">Bounty</tspan></text>
  </g>
  <text x="85" y="270" class="font-mono" font-size="14" fill="#8b949e">agent-assisted recon &#8226; scanning &#8226; source audit &#8226; AI reporting</text>

  <!-- bottom accent line -->
  <rect x="0" y="296" width="1200" height="4" fill="url(#accent)"/>
</svg>
